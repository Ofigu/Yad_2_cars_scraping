name: Yad2 Listing Monitor

on:
  schedule:
    # Run every 20 minutes from 6 AM to midnight (Israel time)
    - cron: '*/20 6-23 * * *'

  # Manual trigger
  workflow_dispatch:

jobs:
  monitor-listings:
    runs-on: self-hosted
    defaults:
      run:
        shell: powershell
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Setup Chrome for Selenium
      id: setup-chrome
      uses: browser-actions/setup-chrome@v1
      with:
        chrome-version: stable

    - name: Cache dependencies
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-uc-${{ hashFiles('**/requirements*.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-uc-
          ${{ runner.os }}-pip-

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests beautifulsoup4
        pip install "selenium>=4.15.0"
        pip install "undetected-chromedriver>=3.5.0"

    - name: Restore monitoring data
      id: cache-restore
      uses: actions/cache@v4
      with:
        path: yad2_data.json
        key: yad2-monitor-data-${{ github.run_number }}
        restore-keys: |
          yad2-monitor-data-

    - name: Show current status
      run: |
        echo "Monitor Status"
        echo "Time: $(Get-Date -Format 'yyyy-MM-dd HH:mm:ss')"
        if (Test-Path yad2_data.json) {
          Get-Content yad2_data.json | python -c "import json,sys; data=json.load(sys.stdin); print('Last total:', data.get('last_total', 0))"
        } else {
          echo "No data found"
        }

    - name: Get Chrome major version
      id: chrome-version
      run: |
        $chromePath = "${{ steps.setup-chrome.outputs.chrome-path }}"
        if (-not $chromePath) { $chromePath = "C:\Program Files\Google\Chrome\Application\chrome.exe" }
        $major = (Get-Item $chromePath).VersionInfo.ProductMajorPart
        echo "major=$major" >> $env:GITHUB_OUTPUT
        echo "Chrome major version: $major"

    - name: Run Yad2 monitor
      env:
        LISTING_URL: ${{ secrets.LISTING_URL }}
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        STORAGE_FILE: yad2_data.json
        PYTHONUNBUFFERED: '1'
        CHROME_BINARY: ${{ steps.setup-chrome.outputs.chrome-path }}
        CHROME_MAIN_VERSION: ${{ steps.chrome-version.outputs.major }}
      run: |
        echo "Starting Yad2 monitor..."
        python yad2_monitor.py

    - name: Save monitoring data
      if: always()
      uses: actions/cache@v4
      with:
        path: yad2_data.json
        key: yad2-monitor-data-${{ github.run_number }}

    - name: Upload debug screenshot
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: debug-screenshot
        path: debug_screenshot.png
        if-no-files-found: ignore

    - name: Show results
      if: always()
      run: |
        echo "=== Monitor Results ==="
        if (Get-ChildItem *.json -ErrorAction SilentlyContinue) { Get-ChildItem *.json | Select-Object Name, Length } else { echo "No json files found" }
        echo "====================="
